kind = "web"
previewPath = "/"
title = "KlikFilm Scraper"
version = "1.0.0"
id = "artifacts/klikfilm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21675

[services.development]
run = "pnpm --filter @workspace/klikfilm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klikfilm", "run", "build" ]
publicDir = "artifacts/klikfilm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21675"
BASE_PATH = "/"
