openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KlikFilm Scraper API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie scraper operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /movies:
    get:
      operationId: getMovies
      tags: [movies]
      summary: Get movies list
      description: Scrape and return movies from klikfilm.web.id
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoviesResponse"
        "500":
          description: Scraping error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /movies/{slug}:
    get:
      operationId: getMovieDetail
      tags: [movies]
      summary: Get movie detail
      description: Scrape and return detailed info for a specific movie
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
        "404":
          description: Movie not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scraping error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /genres:
    get:
      operationId: getGenres
      tags: [movies]
      summary: Get available genres
      description: Returns list of genres from klikfilm.web.id
      responses:
        "200":
          description: List of genres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenresResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Movie:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        poster:
          type: string
        year:
          type: string
        rating:
          type: string
        genre:
          type: array
          items:
            type: string
        quality:
          type: string
        url:
          type: string
      required:
        - title
        - slug
        - poster
        - url
    MovieDetail:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        poster:
          type: string
        year:
          type: string
        rating:
          type: string
        genre:
          type: array
          items:
            type: string
        quality:
          type: string
        url:
          type: string
        synopsis:
          type: string
        duration:
          type: string
        country:
          type: string
        director:
          type: string
        cast:
          type: array
          items:
            type: string
        streamUrls:
          type: array
          items:
            type: string
      required:
        - title
        - slug
        - poster
        - url
    MoviesResponse:
      type: object
      properties:
        movies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        totalPages:
          type: integer
        currentPage:
          type: integer
      required:
        - movies
        - totalPages
        - currentPage
    GenresResponse:
      type: object
      properties:
        genres:
          type: array
          items:
            type: string
      required:
        - genres
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
